name: Build nova-level (macOS)

on:
  push:
    paths:
      - 'pplguins/nova-level/**'
      - '.github/workflows/build-nova-level.yml'
  pull_request:
    paths:
      - 'pplguins/nova-level/**'
      - '.github/workflows/build-nova-level.yml'

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup dependencies
        run: |
          # Install CMake if needed
          if ! command -v cmake &> /dev/null; then
            brew install cmake
          fi
          # Add other dependencies here if required

      - name: Build with CMake (if available)
        if: hashFiles('pplguins/nova-level/CMakeLists.txt') != ''
        run: |
          mkdir -p pplguins/nova-level/build
          cd pplguins/nova-level/build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          cmake --build . --config Release

      - name: Build with Xcode (if available)
        if: hashFiles('pplguins/nova-level/*.xcodeproj') != ''
        run: |
          PROJECT_PATH=$(find pplguins/nova-level -name '*.xcodeproj' | head -n 1)
          if [ -n "$PROJECT_PATH" ]; then
            xcodebuild -project "$PROJECT_PATH" -scheme nova-level build -configuration Release
          fi

      - name: Build with Makefile (if available)
        if: hashFiles('pplguins/nova-level/Makefile') != ''
        run: |
          cd pplguins/nova-level
          make clean || true
          make